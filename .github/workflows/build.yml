name: Build GeoIP and GeoSite

on:
  schedule:
    - cron: "0 0 */3 * *" # Run every 3 days at 00:00 UTC
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".gitignore"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set release tag
        id: tag
        run: |
          BASE=$(date +'%Y%m%d')
          if [ "${{ github.ref_name }}" = "dev" ]; then
            TAG="dev-${BASE}"
          else
            TAG="${BASE}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Download source files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch_sources.py

      - name: Parse whitelist data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/parse_whitelist.py

      - name: Merge categories into geoip.dat
        run: |
          python scripts/merge_geoip.py

      - name: Merge categories into geosite.dat
        run: |
          python scripts/merge_geosite.py

      - name: Verify output files
        run: |
          if [ ! -f output/geoip.dat ]; then
            echo "ERROR: geoip.dat not found"
            exit 1
          fi
          if [ ! -f output/geosite.dat ]; then
            echo "ERROR: geosite.dat not found"
            exit 1
          fi
          echo "geoip.dat size: $(stat -c%s output/geoip.dat) bytes"
          echo "geosite.dat size: $(stat -c%s output/geosite.dat) bytes"

      - name: Check if output changed
        id: check
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/prev_release
          LATEST_TAG=$(gh release list --limit 1 --exclude-pre-releases --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ] && gh release download "$LATEST_TAG" --pattern "*.dat" --dir /tmp/prev_release 2>/dev/null; then
            OLD_GEOIP=$(sha256sum /tmp/prev_release/geoip.dat | cut -d' ' -f1)
            OLD_GEOSITE=$(sha256sum /tmp/prev_release/geosite.dat | cut -d' ' -f1)
            NEW_GEOIP=$(sha256sum output/geoip.dat | cut -d' ' -f1)
            NEW_GEOSITE=$(sha256sum output/geosite.dat | cut -d' ' -f1)
            if [ "$OLD_GEOIP" != "$NEW_GEOIP" ] || [ "$OLD_GEOSITE" != "$NEW_GEOSITE" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Data files changed"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "Data files unchanged, skipping commit"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "No previous release found, treating as changed"
          fi

      - name: Update LastUpdated timestamp
        if: github.ref_name == 'main' && steps.check.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date +%s)
          python3 << EOF
          import json

          with open('JSON.DEFAULT', 'r', encoding='utf-8') as f:
              data = json.load(f)

          data['LastUpdated'] = "$TIMESTAMP"

          with open('JSON.DEFAULT', 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print(f"Updated LastUpdated to $TIMESTAMP")
          EOF

      - name: Generate HAPP deeplink (only if changed)
        if: github.ref_name == 'main'
        run: |
          BASE64_CONFIG=$(base64 -w 0 JSON.DEFAULT)
          NEW_LINK="happ://routing/add/${BASE64_CONFIG}"

          # Если файла нет — создаём
          if [ ! -f HAPP_DEEPLINK ]; then
            echo "$NEW_LINK" > HAPP_DEEPLINK
            echo "HAPP_DEEPLINK created"
            exit 0
          fi

          # Считываем текущее содержимое
          CURRENT_LINK=$(cat HAPP_DEEPLINK)

          # Сравниваем
          if [ "$CURRENT_LINK" != "$NEW_LINK" ]; then
            echo "$NEW_LINK" > HAPP_DEEPLINK
            echo "HAPP_DEEPLINK updated"
          else
            echo "No changes detected"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ github.ref_name == 'dev' && 'Dev Release' || 'Release' }} ${{ steps.tag.outputs.tag }}
          body: |
            # Release ${{ steps.tag.outputs.tag }}

            `geoip.dat` и `geosite.dat` с whitelist категориями из российских источников.

            **Категории:**
            - **WHITELIST-RU** (GeoIP) - Российские IP адреса
            - **WHITELIST-RU** (GeoSite) - Российские домены

            **Использование:** см. [README](https://github.com/1nFern0-git/RU-whitelist-routing#readme)
          files: |
            output/geoip.dat
            output/geosite.dat
          draft: false
          prerelease: ${{ github.ref_name == 'dev' }}

      - name: Commit and push changes
        if: github.ref_name == 'main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add JSON.DEFAULT HAPP_DEEPLINK

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          if [ "${{ steps.check.outputs.changed }}" = "true" ]; then
            MSG="chore: Update LastUpdated timestamp [${{ steps.tag.outputs.tag }}]"
          else
            MSG="chore: regenerate HAPP_DEEPLINK after JSON.DEFAULT change"
          fi

          git commit -m "$MSG"
          git push

      # NOTE: this step rewrites the working tree (git rm -rf . + git clean -fdx),
      # so it must run AFTER the main-branch commit above. Otherwise it wipes the
      # JSON.DEFAULT/HAPP_DEEPLINK edits before they get committed.
      - name: Deploy to release branch (jsDelivr mirror)
        if: github.ref_name == 'main' || github.ref_name == 'dev'
        run: |
          # Target branch: 'release' for main, 'release-dev' for dev
          if [ "${{ github.ref_name }}" = "dev" ]; then
            TARGET_BRANCH="release-dev"
          else
            TARGET_BRANCH="release"
          fi
          echo "Deploying to branch: $TARGET_BRANCH"

          # Save dat files outside the worktree
          cp output/geoip.dat /tmp/geoip.dat
          cp output/geosite.dat /tmp/geosite.dat

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Create fresh orphan branch (no history, replaces existing)
          git checkout --orphan release-tmp
          git rm -rf . 2>/dev/null || true
          git clean -fdx

          # Add only the dat files
          cp /tmp/geoip.dat geoip.dat
          cp /tmp/geosite.dat geosite.dat
          git add geoip.dat geosite.dat
          git commit -m "release: ${{ steps.tag.outputs.tag }}"

          # Force-push as target branch (replaces existing history)
          git branch -M release-tmp "$TARGET_BRANCH"
          git push --force origin "$TARGET_BRANCH"

          # Return to source branch for any subsequent steps
          git checkout "${{ github.ref_name }}"
